<nav
  class="d-flex flex-md-column flex-row flex-grow-1 align-items-center align-items-lg-start px-lg-3 pt-md-4 text-white sidebar-nav"
>
  <a
    href="/"
    class="d-flex align-items-center mb-md-5 text-white text-decoration-none"
  >
    <div class="logo-container d-flex align-items-center">
      <img
        src="./assets/img/splitty.svg"
        class="img-fluid logo-img"
        alt="Splitty Logo"
      />
      <span class="d-none d-lg-inline ms-2 fs-4 splitty-logo">Splitty</span>
    </div>
  </a>

  <ul
    class="nav nav-pills flex-md-column flex-row w-100 text-center text-lg-start flex-nowrap flex-shrink-1 flex-md-grow-0 flex-grow-1 mb-md-auto mb-0 justify-content-around justify-content-md-center align-items-center align-items-md-start gap-md-2"
    id="menu"
  >
    <li class="nav-item w-100">
      <a
        routerLink="/debts"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
      >
        <mat-icon>account_balance_wallet</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Deudas</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a
        routerLink="/expense/details"
        routerLinkActive="active"
        class="nav-link"
      >
        <mat-icon>receipt_long</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Gastos</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a routerLink="/stats" routerLinkActive="active" class="nav-link">
        <mat-icon>leaderboard</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Reportes</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a
        routerLink="/expense"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link add-btn"
      >
        <mat-icon>add_circle</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Añadir</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a routerLink="/users" routerLinkActive="active" class="nav-link">
        <mat-icon>people</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Usuarios</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a
        routerLink="/forecast"
        routerLinkActive="active"
        [class.disabled]="!weatherActive()"
        class="nav-link"
      >
        <mat-icon>wb_sunny</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Tiempo</span>
      </a>
    </li>

    <li class="nav-item w-100">
      <a
        routerLink="/settings"
        routerLinkActive="active"
        class="nav-link"
      >
        <mat-icon>settings</mat-icon>
        <span class="ms-3 d-none d-lg-inline" i18n>Config</span>
      </a>
    </li>
  </ul>
</nav>
