<header class="mt-atuo bg-white">
  @if (weatherInfo(); as info) {
    <div class="container flex">
      <div>{{ info.name }}, {{ info.sys.country }}:</div>
      <div>
        <img
          src="http://openweathermap.org/img/w/{{ info.weather[0].icon }}.png"
          alt="{{ info.name }}"
        />
        {{ info.weather[0].description }}
      </div>
      <b class="temp"> {{ info.main.temp }} °C</b>
    </div>
  }
  </header>
