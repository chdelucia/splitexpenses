<div class="row justify-content-center">
  <div class="col-12 col-xl-10">
    <div class="app-card p-4 p-md-5 bg-white shadow-sm border-0">
      <div class="text-center mb-5">
        <h2 class="text-navy m-0" i18n>👤 Gestión de Miembros</h2>
        <p class="text-muted small mt-1" i18n>
          Añade nuevos participantes al grupo de gastos
        </p>
      </div>

      <form
        [formGroup]="userForm"
        (ngSubmit)="onSubmit()"
        class="row g-3 align-items-center justify-content-center"
      >
        <div class="col-12 col-md-4">
          <label
            class="smaller text-muted text-uppercase fw-bold mb-2 d-block"
            i18n
            >Nombre completo</label
          >
          <mat-form-field appearance="outline" class="w-100 no-subscript">
            <input
              matInput
              formControlName="user"
              placeholder="Ej: Juan Pérez"
              required
            />
            <mat-icon matPrefix class="me-2 text-muted">person_add</mat-icon>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-4">
          <label
            class="smaller text-muted text-uppercase fw-bold mb-2 d-block"
            i18n
            >WhatsApp (opcional)</label
          >
          <mat-form-field appearance="outline" class="w-100 no-subscript">
            <input
              matInput
              formControlName="phone"
              type="number"
              placeholder="Ej: 34600000000"
            />
            <mat-icon matPrefix class="me-2 text-muted">whatsapp</mat-icon>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-2 align-self-end mb-1">
          <button
            [disabled]="!userForm.valid"
            class="btn btn-primary w-100 py-3"
            type="submit"
          >
            <span class="fw-bold" i18n>Añadir</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
