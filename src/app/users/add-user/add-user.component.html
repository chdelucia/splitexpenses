<div class="row justify-content-center">
  <div class="col-12 col-xl-10">
    <div class="app-card p-4 p-md-5">
      <div class="text-center mb-5">
        <h2 class="m-0" i18n>👤 Gestión de Usuarios</h2>
        <p class="text-muted mt-2 small" i18n>
          Añade a las personas con las que compartes gastos.
        </p>
      </div>

      <form
        [formGroup]="userForm"
        (ngSubmit)="onSubmit()"
        class="row g-4 align-items-end"
      >
        <div class="col-12 col-md-5">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label i18n>Nombre del usuario</mat-label>
            <input
              matInput
              formControlName="user"
              placeholder="Ej: Juan Pérez"
              required
            />
            <mat-icon matPrefix class="me-2 text-primary">person_add</mat-icon>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label i18n>WhatsApp (opcional)</mat-label>
            <input
              matInput
              formControlName="phone"
              type="number"
              placeholder="Ej: 34600000000"
            />
            <mat-icon matPrefix class="me-2 text-primary">whatsapp</mat-icon>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-3">
          <button
            [disabled]="!userForm.valid"
            class="w-100 btn btn-primary py-3 d-flex align-items-center justify-content-center gap-2"
            type="submit"
          >
            <mat-icon>person_add_alt</mat-icon>
            <span class="fw-bold" i18n>Añadir</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
