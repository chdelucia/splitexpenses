@if (users()) {
  <div class="users-grid">
    @for (user of users(); track user.id) {
      <div class="glass-card user-card animate-in">
        <div class="user-avatar">
          {{ user.name.charAt(0) }}
        </div>

        <div class="user-details">
          <div
            #nameCell
            contentEditable
            class="user-name"
            (focusout)="edit(nameCell, user, 'name')"
            spellcheck="false"
          >
            {{ user.name }}
          </div>
          <div
            #phoneCell
            contentEditable
            class="user-phone"
            (focusout)="edit(phoneCell, user, 'phone')"
            spellcheck="false"
          >
            {{ user.phone }}
          </div>
        </div>

        <button mat-icon-button class="delete-btn" (click)="delete(user.id)" i18n-aria-label aria-label="Eliminar usuario">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    }
  </div>
}
